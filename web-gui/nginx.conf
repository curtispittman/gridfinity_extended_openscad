server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    default_type application/octet-stream;
    gzip on;
    gzip_types text/plain text/javascript application/javascript application/wasm application/json image/svg+xml;

    # WebAssembly must be served as application/wasm for streaming instantiation.
    location ~ \.wasm$ {
        default_type application/wasm;
    }

    # Serve the model files, and expose the directory as JSON so gallery.html
    # can enumerate them dynamically (no manifest to maintain).
    location /models/ {
        autoindex on;
        autoindex_format json;
    }

    # Root: show the model picker when there's no query string, but hand off to
    # the OpenSCAD web app when deep-linked, e.g.
    #   /?http://<host>/models/gridfinity_basic_cup.scad
    # (the app reads the model URL from the query string and boots the customizer).
    location = / {
        if ($args = "") {
            rewrite ^ /gallery.html last;
        }
        try_files /index.html =404;
    }

    # Everything else (the app bundle: index.js, worker.js, openscad.wasm, fonts).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
